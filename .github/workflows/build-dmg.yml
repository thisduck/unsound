name: build dmg

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0). Leave empty for a test build (artifact only, no release)."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: macOS dmg (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure OpenSSL
        run: echo "CMAKE_PREFIX_PATH=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: dmg

      - name: Bump version
        if: inputs.version != ''
        run: python3 scripts/bump-version.py "${{ inputs.version }}"

      - name: Commit and tag release
        if: inputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          # The dispatch snapshot can trail a just-pushed commit; build the
          # real tip of main so the release matches it.
          git pull --rebase origin main
          git stash pop
          git add -A
          git commit -m "release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:main --tags

      - name: Install frontend dependencies
        run: npm ci

      - name: Write notarization API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"

      - name: Build app and dmg (signed + notarized)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: npm run tauri build

      - name: Upload dmg artifact (test build)
        if: inputs.version == ''
        uses: actions/upload-artifact@v4
        with:
          name: unsound-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Create GitHub release
        if: inputs.version != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            src-tauri/target/release/bundle/dmg/*.dmg \
            --title "unsound v${{ inputs.version }}" \
            --generate-notes
